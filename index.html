<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tianyan Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/gruvbox-dark-medium.min.css">
    <link rel="stylesheet" href="assets/css/gitbook-style.css">
</head>
<body>
    <!-- Top Header Bar -->
    <header id="top-header" class="top-header">
        <div class="header-clouds" aria-hidden="true"></div>
        <div class="header-left">
            <a href="#" class="site-logo" id="site-logo-link">
                <span class="logo-icon">T</span>
                <span class="logo-text">Gao-Tian Cafe</span>
            </a>
        </div>
        <div class="header-right">
            <button class="search-trigger" id="search-trigger">
                <i class="fas fa-search"></i>
                <span>Search...</span>
                <kbd>Ctrl K</kbd>
            </button>
        </div>
    </header>
    <div class="top-header-blur"></div>
    <div class="top-header-shadow" aria-hidden="true"></div>

    <div id="app">
        <!-- Left Sidebar -->
        <aside id="sidebar" class="sidebar">
            <nav id="main-nav" class="main-nav">
                <!-- Navigation will be generated from config -->
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <div class="content-wrapper">
                <div class="content-header-bar">
                    <div id="breadcrumb" class="breadcrumb">
                        <!-- Breadcrumb -->
                    </div>
                </div>
                
                <article id="page-content" class="page-content">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>Loading...</span>
                    </div>
                </article>
            </div>
        </main>
    </div>
    
    <!-- Search Modal -->
    <div id="search-modal" class="search-modal">
        <div class="search-modal-content">
            <div class="search-modal-header">
                <i class="fas fa-search"></i>
                <input type="text" id="search-modal-input" placeholder="Search...">
                <kbd>ESC</kbd>
            </div>
            <div id="search-results" class="search-results">
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="assets/js/clouds.js"></script>
    <script src="assets/js/site.js"></script>
</body>
</html>
